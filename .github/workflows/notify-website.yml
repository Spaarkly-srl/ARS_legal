# Notifica il sito marketing (ARS_mrkt_website) quando i documenti legali
# cambiano: il sito esegue il sync e apre una PR con i testi aggiornati.
# Richiede il secret WEBSITE_DISPATCH_TOKEN: fine-grained PAT (o GitHub App)
# con accesso a Spaarkly-srl/ARS_mrkt_website, permesso Contents: read+write.
name: Notify website of legal updates

on:
  push:
    branches: [main]
    paths:
      - "manifest.json"
      - "privacy-policy/**"
      - "privacy-policy-*/**"
      - "cookie-policy/**"
      - "terms/**"
      - "terms-*/**"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository dispatch verso ARS_mrkt_website
        run: |
          curl -sS -f -X POST \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Spaarkly-srl/ARS_mrkt_website/dispatches \
            -d '{"event_type":"legal-content-updated"}'
